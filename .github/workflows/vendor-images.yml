name: Vendor Ory Images to GHCR

on:
  schedule:
    - cron: '0 4 * * 1'  # Weekly on Monday at 04:00 UTC
  workflow_dispatch:

jobs:
  vendor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - upstream: oryd/kratos:v1.3.1
            target: kratos-vendor
            tag_var: KRATOS_VENDOR_TAG
          - upstream: oryd/hydra:v2.3.0
            target: hydra-vendor
            tag_var: HYDRA_VENDOR_TAG
          - upstream: oryd/kratos-selfservice-ui-node:v1.3.1
            target: kratos-selfservice-ui-node-vendor
            tag_var: LOGIN_UI_VENDOR_TAG

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, re-tag with upstream digest, push
        env:
          UPSTREAM_IMAGE: ${{ matrix.upstream }}
          GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.target }}
          TAG_VAR: ${{ matrix.tag_var }}
        run: |
          set -e
          docker pull "${UPSTREAM_IMAGE}"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${UPSTREAM_IMAGE}" | cut -d@ -f2)
          SHORT_TAG="d-$(echo "$DIGEST" | sed 's/sha256://' | cut -c1-12)"

          docker tag "${UPSTREAM_IMAGE}" "${GHCR_IMAGE}:latest"
          docker tag "${UPSTREAM_IMAGE}" "${GHCR_IMAGE}:${SHORT_TAG}"
          docker push "${GHCR_IMAGE}:latest"
          docker push "${GHCR_IMAGE}:${SHORT_TAG}"

          echo "Vendored ${UPSTREAM_IMAGE} -> ${GHCR_IMAGE}:{latest,${SHORT_TAG}}"
          mkdir -p tag-out
          echo "${TAG_VAR}=${SHORT_TAG}" > "tag-out/${{ matrix.target }}.env"

      - name: Upload tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: tag-${{ matrix.target }}
          path: tag-out/${{ matrix.target }}.env

  redeploy:
    needs: vendor
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: deploy-branch
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all tag artifacts
        uses: actions/download-artifact@v4
        with:
          path: tags
          merge-multiple: true

      - name: Rebuild deploy branch pinned to vendored digests
        run: |
          set -e
          for f in tags/*.env; do
            echo "Loading $f"
            # shellcheck disable=SC1090
            source "$f"
          done
          export KRATOS_VENDOR_TAG HYDRA_VENDOR_TAG LOGIN_UI_VENDOR_TAG
          bash .github/scripts/build-deploy-branch.sh

      - name: Check Portainer webhook secret
        id: webhook
        env:
          HOOK: ${{ secrets.PORTAINER_REDEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then echo "set=true" >> "$GITHUB_OUTPUT"; fi

      - name: Trigger Portainer Redeploy Webhook
        if: steps.webhook.outputs.set == 'true'
        uses: distributhor/workflow-webhook@2381f0e9c7b6bf061fb1405bd0804b8706116369 # v3.0.8
        with:
          webhook_url: ${{ secrets.PORTAINER_REDEPLOY_HOOK }}
          webhook_secret: "trigger"
