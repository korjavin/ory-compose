name: Deploy Ory Stack

# Handles every master push EXCEPT those that touched paths watched by
# build-services.yml (consent/, invite/, config/) — those rebuild and
# pin tags themselves. Everything else (compose tweaks, docs, etc.) flows
# through here and just re-pins the deploy branch to master HEAD with the
# tags already recorded in image-tags.env.

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'consent/**'
      - 'invite/**'
      - 'config/**'
      - '.github/workflows/build-services.yml'
      - '.github/workflows/vendor-images.yml'
      - '.github/scripts/build-deploy-branch.sh'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: deploy-branch
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild deploy branch
        run: bash .github/scripts/build-deploy-branch.sh

      - name: Check Portainer webhook secret
        id: webhook
        env:
          HOOK: ${{ secrets.PORTAINER_REDEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then echo "set=true" >> "$GITHUB_OUTPUT"; fi

      - name: Trigger Portainer Redeploy Webhook
        if: steps.webhook.outputs.set == 'true'
        uses: distributhor/workflow-webhook@2381f0e9c7b6bf061fb1405bd0804b8706116369 # v3.0.8
        with:
          webhook_url: ${{ secrets.PORTAINER_REDEPLOY_HOOK }}
          webhook_secret: "trigger"
